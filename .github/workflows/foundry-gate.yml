# foundry-gate.yml — Event-driven bridge: GitHub events → local foundry check
#
# Runs on a self-hosted runner (Mac mini). Triggers when:
#   1. Any CI/review workflow completes on a foundry/ branch or labeled PR
#   2. A review is submitted on a foundry/ branch or labeled PR
#   3. A PR with the "foundry" label receives any of the above events
#
# This means:
#   - Muhammad's PRs: reviews run normally on GitHub, he fixes issues himself
#   - Foundry agent PRs (foundry/ branch): auto-checked + auto-respawned locally
#   - Any PR labeled "foundry": opted-in to local checking (manual or via `foundry register`)
#
# Security: All event data is passed via env vars (never inlined into shell).
# This prevents command injection from crafted branch names or PR titles.
#
# Requires: GitHub Actions self-hosted runner with label "foundry"
# Setup: bash ~/.openclaw/workspace/scripts/foundry/scripts/setup-runner.sh

name: Foundry Gate

on:
  # Fires when any of our CI/review workflows complete
  workflow_run:
    workflows:
      - "Tests & Lint"
      - "Claude Code Review"
      - "Codex Code Review"
      - "Gemini Review Check"
    types: [completed]

  # Fires when a human or bot submits/dismisses a review
  pull_request_review:
    types: [submitted, dismissed]

  # Fires when PR is closed (merged/abandoned) or labeled
  pull_request:
    types: [closed, labeled]

jobs:
  react:
    # Trigger on foundry/ branches OR PRs with "foundry" label.
    # workflow_run also checks labels (resolved in the step below).
    if: |
      (github.event_name == 'pull_request_review' && (
        startsWith(github.event.pull_request.head.ref, 'foundry/') ||
        contains(toJson(github.event.pull_request.labels), '"foundry"')
      )) ||
      (github.event_name == 'pull_request' && (
        startsWith(github.event.pull_request.head.ref, 'foundry/') ||
        contains(toJson(github.event.pull_request.labels), '"foundry"')
      )) ||
      github.event_name == 'workflow_run'

    runs-on: [self-hosted, foundry]
    timeout-minutes: 5

    steps:
      - name: Find PR and run foundry check
        # Pass all event data via env vars — never inline ${{ }} into run: shell.
        # This prevents command injection from crafted branch names.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPO: ${{ github.repository }}
          # PR events
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          LABEL_NAME: ${{ github.event.label.name }}
          # workflow_run events
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          FOUNDRY="$HOME/.openclaw/workspace/scripts/foundry/foundry"
          DB="$HOME/.openclaw/workspace/scripts/foundry/foundry.db"

          # ── Determine PR number from event ─────────────────────────
          PR=""
          BRANCH=""
          if [ "$EVENT_NAME" = "pull_request_review" ] || [ "$EVENT_NAME" = "pull_request" ]; then
            PR="$PR_NUMBER"
            BRANCH="$PR_HEAD_REF"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            BRANCH="$WR_HEAD_BRANCH"

            # For workflow_run, check if this branch belongs to a foundry task
            # or a PR with the "foundry" label. Skip if neither.
            is_foundry=false
            case "$BRANCH" in
              foundry/*) is_foundry=true ;;
            esac

            if [ "$is_foundry" = "false" ]; then
              # Check if there's a PR with the "foundry" label for this branch
              has_label=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
                --json labels --jq '[.[0].labels[]?.name] | any(. == "foundry")' 2>/dev/null || echo "false")
              if [ "$has_label" != "true" ]; then
                echo "workflow_run on non-foundry branch '$BRANCH' without foundry label — skipping"
                exit 0
              fi
              is_foundry=true
            fi

            # Find PR — filter to same-repo PRs only (excludes forks)
            PR=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
              --json number,headRepositoryOwner \
              --jq "[.[] | select(.headRepositoryOwner.login == \"${REPO%%/*}\")] | .[0].number // empty" \
              2>/dev/null || true)
          fi

          if [ -z "$PR" ]; then
            echo "No PR found — skipping"
            exit 0
          fi

          # ── Skip if this was just a non-foundry label being added ──
          if [ "$EVENT_NAME" = "pull_request" ] && [ "$EVENT_ACTION" = "labeled" ]; then
            if [ "$LABEL_NAME" != "foundry" ]; then
              echo "Label '$LABEL_NAME' added — not 'foundry', skipping"
              exit 0
            fi
            echo "PR#$PR labeled 'foundry' — registering for local checks"
          fi

          echo "Gate triggered: $REPO PR#$PR branch=$BRANCH (event: $EVENT_NAME)"

          # ── Look up task ID from local SQLite registry ─────────────
          TASK_ID=""
          if [ -f "$DB" ]; then
            # Use parameterized query to prevent SQL injection from PR number
            TASK_ID=$(sqlite3 "$DB" "SELECT id FROM tasks WHERE (pr LIKE '%/pull/' || CAST($PR AS TEXT) OR pr LIKE '%/' || CAST($PR AS TEXT)) AND status NOT IN ('merged','done','done-no-pr','killed','closed') LIMIT 1;" 2>/dev/null || true)
          fi

          if [ -z "$TASK_ID" ]; then
            echo "No active task found for PR#$PR — running full check"
            bash "$FOUNDRY" check 2>&1 || true
            exit 0
          fi

          echo "Matched task: $TASK_ID"

          # ── Log gate event in registry ─────────────────────────────
          sqlite3 "$DB" "INSERT INTO events (task_id, event, details) VALUES ('$(echo "$TASK_ID" | tr -cd 'a-zA-Z0-9_-')', 'gate', 'GitHub event: $EVENT_NAME PR#$PR');" 2>/dev/null || true

          # ── Run targeted check (handles state machine + notifications) ──
          bash "$FOUNDRY" check "$TASK_ID" 2>&1 || true
